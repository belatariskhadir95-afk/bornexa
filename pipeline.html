<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00C896">
<meta name="robots" content="noindex, nofollow">
<title>BORNEXA Pipeline — suivi devis & paiements</title>
<link rel="icon" href="images/favicon.svg" type="image/svg+xml">
<style>
:root{--primary:#00C896;--primary-dark:#009E76;--navy:#0B1E3C;--dark:#0C1018;--bg:#F6F8FB;--text:#0F172A;--muted:#64748B;--border:#E2E8F0;--r:14px;--red:#DC2626;--amber:#F59E0B}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;color:var(--text);background:var(--bg);line-height:1.5}
.topbar{background:linear-gradient(135deg,var(--navy),var(--dark));color:#fff;padding:13px 18px;display:flex;align-items:center;gap:12px;border-bottom:3px solid var(--primary)}
.topbar svg{width:30px;height:30px}.topbar b{font-weight:800}.topbar span{display:block;font-size:.7rem;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.5px}
.wrap{max-width:1040px;margin:0 auto;padding:20px 16px}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}@media(max-width:760px){.kpis{grid-template-columns:repeat(2,1fr)}}
.kpi{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px}
.kpi .v{font-size:1.25rem;font-weight:800;color:var(--navy)}.kpi .l{font-size:.74rem;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.kpi.alert .v{color:var(--red)}.kpi.ok .v{color:var(--primary-dark)}
.filters{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.chip{padding:7px 13px;border-radius:999px;border:1.5px solid var(--border);background:#fff;font-weight:700;font-size:.82rem;cursor:pointer;color:var(--text)}
.chip.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.row{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--border);border-radius:12px;padding:13px 15px;margin-bottom:9px;flex-wrap:wrap}
.row.urgent{border-color:var(--red);box-shadow:0 0 0 1px rgba(220,38,38,.15)}
.row .nm{font-weight:800;color:var(--navy)}.row .id{font-size:.72rem;color:var(--muted)}
.row .meta{flex:1;min-width:170px}
.row .amt{font-weight:800;color:var(--navy);font-variant-numeric:tabular-nums;min-width:90px;text-align:right}
.stage{font-size:.72rem;font-weight:800;padding:3px 10px;border-radius:999px;background:#F1F5F9;color:var(--muted);white-space:nowrap}
.stage.s1{background:#E0F2FE;color:#075985}.stage.s2{background:var(--primary-light,#E0FBF4);color:var(--primary-dark)}.stage.s3{background:#FEF3C7;color:#92400E}.stage.s4{background:#DCFCE7;color:#166534}
.rel{font-size:.78rem;color:var(--amber);font-weight:700;margin-top:3px}.rel.late{color:var(--red)}
.btn{padding:8px 13px;border-radius:9px;font-weight:700;font-size:.8rem;border:none;cursor:pointer;font-family:inherit;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
.btn-p{background:var(--primary);color:var(--navy)}.btn-p:hover{background:var(--primary-dark);color:#fff}
.btn-o{background:#fff;color:var(--navy);border:1.5px solid var(--border)}.btn-o:hover{border-color:var(--primary)}
.empty{text-align:center;color:var(--muted);padding:34px 10px}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--navy);color:#fff;padding:11px 20px;border-radius:999px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:100}.toast.show{opacity:1}
</style>
</head>
<body data-bornexa-tool="pipeline">
<header class="topbar">
  <svg viewBox="0 0 80 80" aria-hidden="true"><defs><linearGradient id="h" x1="10%" y1="0" x2="90%" y2="100%"><stop offset="0" stop-color="#1ADBA8"/><stop offset="1" stop-color="#009E76"/></linearGradient></defs><polygon points="40,12 64,24 64,52 40,64 16,52 16,24" fill="url(#h)"/><polygon points="46,22 34,42 40,42 33,60 50,40 43,40" fill="#fff"/></svg>
  <div><b>BORNEXA Pipeline</b><span>Suivi devis · factures · paiements · relances</span></div>
</header>
<div class="wrap">
  <div class="kpis" id="kpis"></div>
  <div class="filters" id="filters"></div>
  <div id="list"></div>
</div>
<div class="toast" id="toast"></div>

<script src="js/bornexa-sync.js?v=2026-06-28"></script>
<script src="js/supabase-config.js?v=2026-06-28"></script>
<script src="js/bornexa-supabase.js?v=2026-06-28"></script>
<script src="js/bornexa-ui.js?v=2026-06-28"></script>
<script>
'use strict';
var $=function(s){return document.getElementById(s);};
function toast(m){var t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},1700);}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function eur(n){return (Number(n)||0).toLocaleString('fr-BE',{minimumFractionDigits:0,maximumFractionDigits:0})+' €';}
var DUE=30; var DAY=86400000;
function daysSince(iso){ try{ return Math.floor((Date.now()-new Date(iso).getTime())/DAY); }catch(e){ return 0; } }

function allDossiers(){
  try{ var a=(window.Bornexa&&Bornexa.exportAll)?Bornexa.exportAll():null; var d=(a&&a.dossiers)||{}; return Object.keys(d).map(function(k){return d[k];}); }catch(e){ return []; }
}
function clientName(d){ var v=d.visite&&d.visite.data; return (d.devis&&d.devis.client&&d.devis.client.name)||(v&&v.clientName)||d.name||'(sans nom)'; }
function stageOf(d){
  var f=d.facture||{};
  if(f.solde&&f.solde.paid) return {k:'paid',l:'Payé ✓',c:'s4'};
  if(f.solde&&f.solde.num) return {k:'soldeEmis',l:'Solde envoyé',c:'s3'};
  if(f.acompte&&f.acompte.paid) return {k:'acoPaid',l:'Acompte payé · chantier',c:'s3'};
  if(f.acompte&&f.acompte.num) return {k:'acoEmis',l:'Acompte envoyé',c:'s2'};
  if(d.devis) return {k:'devis',l:'Devis fait',c:'s2'};
  if(d.visite) return {k:'visite',l:'Visite faite',c:'s1'};
  return {k:'new',l:'Nouveau',c:''};
}
function amounts(d){
  var ttc=(d.devis&&Number(d.devis.ttc))||0, f=d.facture||{};
  var pct=(f.pct!=null?f.pct:50);
  var acoTTC=Math.round(ttc*pct/100*100)/100, solTTC=Math.round((ttc-acoTTC)*100)/100;
  var paid=0,pending=0,overdue=0;
  if(f.acompte&&f.acompte.num){ if(f.acompte.paid)paid+=acoTTC; else {pending+=acoTTC; if(daysSince(f.acompte.date)>DUE)overdue+=acoTTC;} }
  if(f.solde&&f.solde.num){ if(f.solde.paid)paid+=solTTC; else {pending+=solTTC; if(daysSince(f.solde.date)>DUE)overdue+=solTTC;} }
  return {ttc:ttc,paid:paid,pending:pending,overdue:overdue};
}
function relances(d){
  var out=[], f=d.facture||{};
  if(f.acompte&&f.acompte.num&&!f.acompte.paid){ var da=daysSince(f.acompte.date); out.push({t:'Acompte impayé ('+da+' j)',late:da>DUE}); }
  if(f.solde&&f.solde.num&&!f.solde.paid){ var ds=daysSince(f.solde.date); out.push({t:'Solde impayé ('+ds+' j)',late:ds>DUE}); }
  if(d.devis&&!(f.acompte&&f.acompte.num)){ var dv=daysSince(d.devis.generated); if(dv>=7) out.push({t:'Devis sans suite ('+dv+' j) → relancer',late:dv>=21}); }
  return out;
}

var FILTER='all';
var FILTERS=[['all','Tous'],['relance','À relancer'],['impaye','Impayés'],['encours','En cours'],['paye','Payés']];
function matches(d){
  var st=stageOf(d), rl=relances(d);
  if(FILTER==='all') return true;
  if(FILTER==='relance') return rl.length>0;
  if(FILTER==='impaye') return amounts(d).pending>0;
  if(FILTER==='encours') return st.k!=='paid' && st.k!=='new';
  if(FILTER==='paye') return st.k==='paid';
  return true;
}

function render(){
  var ds=allDossiers();
  // KPI
  var k={pipeline:0,paid:0,pending:0,overdue:0,relances:0};
  ds.forEach(function(d){ var a=amounts(d), st=stageOf(d); if(st.k!=='paid'&&d.devis) k.pipeline+=a.ttc; k.paid+=a.paid; k.pending+=a.pending; k.overdue+=a.overdue; k.relances+=relances(d).length?1:0; });
  $('kpis').innerHTML=
    '<div class="kpi"><div class="v">'+eur(k.pipeline)+'</div><div class="l">Pipeline en cours</div></div>'
    +'<div class="kpi ok"><div class="v">'+eur(k.paid)+'</div><div class="l">Encaissé</div></div>'
    +'<div class="kpi"><div class="v">'+eur(k.pending)+'</div><div class="l">À encaisser</div></div>'
    +'<div class="kpi alert"><div class="v">'+eur(k.overdue)+'</div><div class="l">En retard</div></div>'
    +'<div class="kpi'+(k.relances?' alert':'')+'"><div class="v">'+k.relances+'</div><div class="l">À relancer</div></div>';
  // Filters
  $('filters').innerHTML=FILTERS.map(function(f){ return '<button class="chip'+(FILTER===f[0]?' on':'')+'" data-f="'+f[0]+'">'+f[1]+'</button>'; }).join('');
  // List — tri : urgents (relances en retard) d'abord, puis par montant
  var rows=ds.filter(matches).map(function(d){ return {d:d,a:amounts(d),st:stageOf(d),rl:relances(d)}; });
  rows.sort(function(x,y){ var lx=x.rl.some(function(r){return r.late;})?1:0, ly=y.rl.some(function(r){return r.late;})?1:0; if(lx!==ly)return ly-lx; var ux=x.rl.length?1:0,uy=y.rl.length?1:0; if(ux!==uy)return uy-ux; return y.a.ttc-x.a.ttc; });
  if(!rows.length){ $('list').innerHTML='<div class="empty">Aucun dossier dans cette vue.</div>'; }
  else $('list').innerHTML=rows.map(function(r){
    var d=r.d, urgent=r.rl.some(function(x){return x.late;});
    var rel=r.rl.map(function(x){return '<div class="rel'+(x.late?' late':'')+'">'+(x.late?'⚠ ':'• ')+esc(x.t)+'</div>';}).join('');
    var act=(r.st.k==='devis'||r.st.k==='acoPaid')?'<a class="btn btn-p" data-fac="'+esc(d.id)+'">🧾 Facturer</a>':'';
    return '<div class="row'+(urgent?' urgent':'')+'"><div class="meta"><div class="nm">'+esc(clientName(d))+'</div><div class="id">'+esc(d.id)+'</div>'+rel+'</div>'
      +'<span class="stage '+r.st.c+'">'+esc(r.st.l)+'</span>'
      +'<span class="amt">'+(r.a.ttc?eur(r.a.ttc):'—')+'</span>'
      +'<span class="acts" style="display:flex;gap:6px">'+act+'<a class="btn btn-o" data-open="'+esc(d.id)+'">Ouvrir</a></span></div>';
  }).join('');
}

$('filters').addEventListener('click',function(e){ var t=e.target.closest('[data-f]'); if(!t)return; FILTER=t.dataset.f; render(); });
$('list').addEventListener('click',function(e){
  var o=e.target.closest('[data-open]'), f=e.target.closest('[data-fac]');
  if(o){ Bornexa.setCurrent(o.dataset.open); location.href='bornexa-hub'; }
  else if(f){ Bornexa.setCurrent(f.dataset.fac); location.href='facturation'; }
});

render();
document.addEventListener('bornexa:synced', render);
</script>
</body>
</html>
