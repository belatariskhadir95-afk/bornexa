<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;
    -webkit-print-color-adjust:exact!important;
    print-color-adjust:exact!important;}
  @page{size:88mm 58mm;margin:0;}
  html,body{width:88mm;height:58mm;overflow:hidden;}

  .card{
    width:88mm;height:58mm;
    position:relative;overflow:hidden;
    background:#0C1018;
  }

  /* Fond grille subtile */
  .card::before{
    content:'';
    position:absolute;inset:0;
    background-image:
      linear-gradient(rgba(0,200,150,.022)1px,transparent 1px),
      linear-gradient(90deg,rgba(0,200,150,.022)1px,transparent 1px);
    background-size:5.5mm 5.5mm;
    pointer-events:none;
  }

  /* Lueur verte coin haut-droit */
  .glow{
    position:absolute;top:-32mm;right:-18mm;
    width:72mm;height:72mm;border-radius:50%;
    background:radial-gradient(circle,rgba(0,200,150,.07) 0%,transparent 68%);
    pointer-events:none;
  }

  /* Barre accent gauche */
  .accent-bar{
    position:absolute;left:0;top:0;bottom:0;width:3px;
    background:linear-gradient(180deg,#1ADBA8 0%,#00C896 50%,#009E76 100%);
  }

  /* Points déco coin haut-droit */
  .dot-a{position:absolute;top:5.5mm;right:5.5mm;width:5px;height:5px;border-radius:50%;background:#00C896;opacity:.6;}
  .dot-b{position:absolute;top:5.5mm;right:8.8mm;width:3px;height:3px;border-radius:50%;background:#00C896;opacity:.28;}

  /* Zone logo */
  .logo-zone{
    position:absolute;
    top:9.5mm;left:7.5mm;
  }

  /* Slogan bas */
  .slogan-zone{
    position:absolute;bottom:8mm;left:7.5mm;
  }
  .slogan-line{
    width:9mm;height:1px;
    background:linear-gradient(90deg,#00C896,transparent);
    margin-bottom:4px;
  }
  .slogan-text{
    font-family:'Inter',Arial,sans-serif;
    font-size:5px;font-weight:300;
    letter-spacing:3px;text-transform:uppercase;
    color:#00C896;opacity:.85;
  }
</style>
</head>
<body>
<div class="card">
  <div class="glow"></div>
  <div class="accent-bar"></div>
  <div class="dot-a"></div>
  <div class="dot-b"></div>

  <div class="logo-zone">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 90" width="158" height="35.5">
      <defs>
        <linearGradient id="hg" x1="10%" y1="0%" x2="90%" y2="100%">
          <stop offset="0%" stop-color="#1ADBA8"/>
          <stop offset="100%" stop-color="#009E76"/>
        </linearGradient>
      </defs>
      <polygon points="85,45 65,80 25,80 5,45 25,10 65,10" fill="url(#hg)"/>
      <polygon points="56,13 29,47 41,47 26,77 67,43 52,43" fill="rgba(0,40,25,0.2)" transform="translate(1,2)"/>
      <polygon points="56,13 29,47 41,47 26,77 67,43 52,43" fill="#ffffff"/>
      <text x="100" y="52"
        font-family="'Space Grotesk','Arial Black',Arial,sans-serif"
        font-weight="700" font-size="36" letter-spacing="2" fill="#ffffff">BORNEXA</text>
      <text x="101" y="70"
        font-family="'Inter',Arial,sans-serif"
        font-weight="400" font-size="10.5" letter-spacing="3.8" fill="#00C896">LAADPAAL INSTALLATEUR</text>
    </svg>
  </div>

  <div class="slogan-zone">
    <div class="slogan-line"></div>
    <div class="slogan-text">Powering Your Next Drive</div>
  </div>
</div>
</body>
</html>
